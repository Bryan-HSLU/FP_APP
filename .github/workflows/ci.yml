name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # liest die Version aus packageManager

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Abhängigkeiten installieren
        run: |
          pnpm install --frozen-lockfile
          uv --project services/engines sync

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests (inkl. Regel-Paritätstest)
        run: pnpm test

      - name: Schema-Check (data/ gegen Verträge)
        run: pnpm schema-check
